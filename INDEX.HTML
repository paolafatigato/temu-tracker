<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛍️ Temu Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#ff7701;
  --orange-dark:#cc6000;
  --orange-light:#fff0e6;
  --amber:#efca08;
  --teal:#00a6a6;
  --teal-light:#e0f7f7;
  --purple:#9c528b;
  --purple-light:#f5eaf3;
  --white:#ffffff;
  --bg:#fffaf5;
  --surface:#ffffff;
  --ink:#1a0d00;
  --ink2:#5a3a1a;
  --ink3:#a07050;
  --border:#f0ddc8;
  --border2:#e8c9a8;
  --radius:7px;
  --sh:0 2px 10px rgba(255,119,1,.10);
  --sh-lg:0 8px 36px rgba(255,119,1,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── HEADER ── */
.app-header{
  background:var(--orange);
  padding:0 24px;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 3px 18px rgba(255,119,1,.45)
}
.app-title{font-size:18px;font-weight:700;color:var(--white);letter-spacing:-.3px}
.app-title span{color:var(--amber)}
.global-stats{display:flex;gap:28px}
.gstat .lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.6)}
.gstat .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--white)}

/* ── YEAR NAV ── */
.year-nav{
  background:#cc6000;
  display:flex;align-items:center;padding:0 20px;
  position:sticky;top:50px;z-index:98;
  border-bottom:1px solid rgba(255,255,255,.15)
}
.year-tab{padding:7px 16px;cursor:pointer;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.5);border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;letter-spacing:.5px}
.year-tab:hover{color:rgba(255,255,255,.85)}
.year-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.add-year-btn{margin-left:auto;font-size:10px;color:rgba(255,255,255,.45);
  cursor:pointer;padding:3px 10px;border:1px solid rgba(255,255,255,.2);
  border-radius:4px;background:none;transition:all .2s;font-family:'Sora',sans-serif}
.add-year-btn:hover{color:white;border-color:rgba(255,255,255,.6)}

/* ── MONTH NAV ── */
.months-nav{
  background:var(--surface);border-bottom:2px solid var(--border2);
  display:flex;align-items:stretch;overflow-x:auto;
  position:sticky;top:82px;z-index:97;scrollbar-width:none
}
.months-nav::-webkit-scrollbar{display:none}
.month-tab{
  padding:10px 14px;cursor:pointer;font-weight:600;color:var(--ink3);
  border-bottom:3px solid transparent;white-space:nowrap;
  transition:all .15s;font-size:12px;display:flex;flex-direction:column;
  align-items:center;gap:1px;user-select:none;letter-spacing:.2px
}
.month-tab:hover{color:var(--orange);background:#fff7f0}
.month-tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.month-tab .m-count{font-size:9px;font-weight:400;color:var(--ink3);font-family:'JetBrains Mono',monospace}
.month-tab.active .m-count{color:var(--orange)}
.month-tab.has-data .m-name{position:relative}
.month-tab.has-data .m-name::after{content:'';position:absolute;top:-4px;right:-5px;
  width:5px;height:5px;border-radius:50%;background:var(--orange)}

/* ── MAIN ── */
.month-content{padding:20px 24px 80px;max-width:1600px;margin:0 auto}

/* ── STAT CARDS ── */
.month-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border-radius:var(--radius);
  padding:14px 16px;box-shadow:var(--sh);border-top:3px solid var(--border)}
.stat-card.c1{border-top-color:var(--orange)}
.stat-card.c2{border-top-color:var(--teal)}
.stat-card.c3{border-top-color:var(--amber)}
.stat-card.c4{border-top-color:var(--purple)}
.stat-card .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:4px}
.stat-card .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--ink)}
.stat-card .sub{font-size:10px;color:var(--ink3);margin-top:2px}

/* ── AVG PANEL ── */
.avg-panel{
  background:linear-gradient(135deg,#1a0d00 0%,#3d1c00 100%);
  color:white;border-radius:var(--radius);padding:14px 20px;margin-bottom:16px
}
.avg-panel h3{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;
  color:rgba(255,255,255,.45);margin-bottom:12px}
.avg-grid{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.avg-grid::-webkit-scrollbar{display:none}
.avg-col{flex-shrink:0;min-width:82px;padding:4px 10px;
  border-right:1px solid rgba(255,255,255,.08);cursor:pointer;
  transition:background .15s;border-radius:4px}
.avg-col:last-child{border-right:none}
.avg-col:hover{background:rgba(255,255,255,.06)}
.avg-col.cur .avg-v{color:var(--amber)}
.avg-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.avg-l{font-size:9px;opacity:.4;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.avg-n{font-size:8px;opacity:.35;margin-top:1px}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
select.fs,select.ss{
  padding:6px 10px;border:1.5px solid var(--border2);border-radius:var(--radius);
  background:var(--surface);font-family:'Sora',sans-serif;font-size:12px;
  color:var(--ink);cursor:pointer;transition:border-color .15s
}
select.fs:focus,select.ss:focus{outline:none;border-color:var(--orange)}
.btn{padding:6px 14px;border:none;border-radius:var(--radius);cursor:pointer;
  font-family:'Sora',sans-serif;font-size:12px;font-weight:700;transition:all .15s}
.btn-p{background:var(--orange);color:var(--white)}
.btn-p:hover{background:var(--orange-dark)}
.btn-s{background:var(--surface);color:var(--ink);border:1.5px solid var(--border2)}
.btn-s:hover{border-color:var(--orange);color:var(--orange)}

/* ── TABLE ── */
.table-wrapper{background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{
  background:var(--orange);color:rgba(255,255,255,.92);
  padding:10px 12px;text-align:left;
  font-size:9px;text-transform:uppercase;letter-spacing:1px;
  font-weight:700;white-space:nowrap
}
thead th:first-child{border-radius:7px 0 0 0}
thead th:last-child{border-radius:0 7px 0 0}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:#fff7f0}
tbody tr:last-child{border-bottom:none}
tbody td{padding:0;vertical-align:middle}

/* ── EDITABLE CELLS ── */
.cell{
  padding:8px 12px;display:block;width:100%;height:100%;
  cursor:text;transition:background .12s;border-radius:4px;
  min-height:36px;display:flex;align-items:center
}
.cell:hover{background:var(--orange-light);outline:1px dashed rgba(255,119,1,.3)}
.cell.editing{padding:0}
.cell.editing input,.cell.editing select{
  width:100%;height:100%;min-height:36px;padding:8px 10px;
  border:2px solid var(--orange);border-radius:4px;
  font-family:'Sora',sans-serif;font-size:12.5px;color:var(--ink);
  background:var(--orange-light);outline:none
}
.cell.editing input[type=number]{ font-family:'JetBrains Mono',monospace }
.cell-ro{padding:8px 12px;display:flex;align-items:center;min-height:36px}

/* ── BADGES ── */
.tipo-badge{
  display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:none;
  transition:all .15s;font-family:'Sora',sans-serif;white-space:nowrap
}
.tipo-badge.utile{background:var(--teal-light);color:#007070}
.tipo-badge.sfizio{background:var(--purple-light);color:#7a3d6b}
.tipo-badge.nessuno{background:#f5f0eb;color:#a07050}
.cat-badge{display:inline-block;padding:2px 9px;border-radius:12px;
  font-size:10px;font-weight:600;white-space:nowrap}
.num{font-family:'JetBrains Mono',monospace}
.neg{color:var(--purple)}
.pos{color:var(--teal)}
.muted{color:var(--ink3)}

/* ── ACTION BTNS ── */
.action-btn{background:none;border:none;cursor:pointer;padding:3px 4px;
  border-radius:4px;font-size:13px;transition:all .15s;line-height:1;opacity:.55}
.action-btn:hover{background:var(--orange-light);opacity:1}
.action-btn.del:hover{background:var(--purple-light);color:var(--purple)}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:50px 24px;color:var(--ink3)}
.empty-state .ico{font-size:42px;margin-bottom:10px}
.empty-state h3{font-size:17px;margin-bottom:6px;color:var(--ink)}
.empty-month{text-align:center;padding:60px 24px}
.empty-month h2{font-size:24px;margin-bottom:8px;font-weight:700}
.empty-month p{color:var(--ink3);margin-bottom:18px;font-size:13px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,13,0,.5);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);
  transform:translateY(16px);transition:transform .18s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:18px;font-weight:700}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;
  color:var(--ink3);line-height:1;padding:2px}
.close-btn:hover{color:var(--ink)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:15px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:var(--ink3)}
.form-group input,.form-group select{
  padding:8px 12px;border:1.5px solid var(--border2);border-radius:var(--radius);
  font-family:'Sora',sans-serif;font-size:13px;color:var(--ink);
  background:var(--bg);transition:border-color .15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--orange);background:var(--white)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.computed-val{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:'JetBrains Mono',monospace;font-size:14px;background:#f8f4f0;color:var(--ink3)}
.tipo-selector{display:flex;gap:8px}
.tipo-option{flex:1;padding:8px 6px;border:2px solid var(--border2);border-radius:var(--radius);
  text-align:center;cursor:pointer;font-weight:600;transition:all .15s;font-size:12px}
.tipo-option.sel-utile{border-color:var(--teal);background:var(--teal-light);color:#007070}
.tipo-option.sel-sfizio{border-color:var(--purple);background:var(--purple-light);color:#7a3d6b}
.tipo-option.sel-none{border-color:var(--ink3);background:#f5f0eb;color:var(--ink3)}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end}

/* ── CAT MODAL ── */
.cat-list{display:flex;flex-direction:column;gap:6px}
.cat-item{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--orange);color:white;
  padding:10px 18px;border-radius:var(--radius);font-size:12px;font-weight:600;
  z-index:2000;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none;
  box-shadow:0 4px 20px rgba(255,119,1,.4)}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SEP ROW ── */
.sep-row td{background:linear-gradient(to right,#fff7f0,transparent);
  font-size:9px;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--orange);padding:5px 12px;font-weight:700;border-bottom:1px solid var(--border)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">🛍️ Temu <span>Tracker</span></div>
  <div class="global-stats" id="global-stats"></div>
</header>

<div class="year-nav" id="year-nav"></div>
<nav class="months-nav" id="months-nav"></nav>
<main id="main-content"></main>
<div class="toast" id="toast"></div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="item-modal-overlay" onclick="handleOvClick(event,'item-modal-overlay')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Aggiungi articolo</span>
      <button class="close-btn" onclick="closeItemModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Nome prodotto</label><input type="text" id="f-nome" placeholder="es. cappellino sole 🧢" autocomplete="off"></div>
      <div class="form-row">
        <div class="form-group"><label>Prezzo originale (€)</label><input type="number" step="0.01" min="0" id="f-prezzo" placeholder="0.00" oninput="updateComputed()"></div>
        <div class="form-group"><label>Motivo sconto</label><input type="text" id="f-motivo" placeholder="rimborso, reso, sconto…"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Sconto 1 (€)</label><input type="number" step="0.01" min="0" id="f-sc1" placeholder="0.00" oninput="updateComputed()"></div>
        <div class="form-group"><label>Sconto 2 (€)</label><input type="number" step="0.01" min="0" id="f-sc2" placeholder="0.00" oninput="updateComputed()"></div>
        <div class="form-group"><label>Sconto 3 (€)</label><input type="number" step="0.01" min="0" id="f-sc3" placeholder="0.00" oninput="updateComputed()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>✅ Totale pagato</label><div class="computed-val" id="c-totale">€ 0.00</div></div>
        <div class="form-group"><label>💰 Risparmio</label><div class="computed-val" id="c-risparmio">€ 0.00</div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Prezzo altrove (€)</label><input type="number" step="0.01" min="0" id="f-altrove" placeholder="default = prezzo orig." oninput="updateComputed()"></div>
        <div class="form-group"><label>Dove</label><input type="text" id="f-dove" placeholder="Amazon, Decathlon…"></div>
      </div>
      <div class="form-group"><label>Tipo</label>
        <div class="tipo-selector">
          <div class="tipo-option sel-none" data-tipo="" onclick="selTipo(this)">— Nessuno</div>
          <div class="tipo-option" data-tipo="utile" onclick="selTipo(this)">✨ Utile</div>
          <div class="tipo-option" data-tipo="sfizio" onclick="selTipo(this)">🍬 Sfizio</div>
        </div>
      </div>
      <div class="form-group"><label>Categoria</label><select id="f-cat"></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-s" onclick="closeItemModal()">Annulla</button>
      <button class="btn btn-p" onclick="saveItem()">Salva</button>
    </div>
  </div>
</div>

<!-- CAT MODAL -->
<div class="modal-overlay" id="cat-modal-overlay" onclick="handleOvClick(event,'cat-modal-overlay')">
  <div class="modal" style="max-width:380px">
    <div class="modal-header"><span class="modal-title">🏷️ Categorie</span><button class="close-btn" onclick="closeModal('cat-modal-overlay')">✕</button></div>
    <div class="modal-body">
      <div class="cat-list" id="cat-list-modal"></div>
      <div class="form-group" style="margin-top:4px"><label>Nuova categoria</label><input type="text" id="f-new-cat" placeholder="es. Cancelleria" onkeydown="if(event.key==='Enter')addCategory()"></div>
      <button class="btn btn-p" style="width:100%" onclick="addCategory()">+ Aggiungi</button>
    </div>
  </div>
</div>

const MONTHS_IT=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                 'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const SEED_MAP={
  may:{y:2025,m:5},june:{y:2025,m:6},summer:{y:2025,m:7},
  september:{y:2025,m:9},october:{y:2025,m:10},november25:{y:2025,m:11},
  december:{y:2025,m:12},jan26:{y:2026,m:1},feb26:{y:2026,m:2},march26:{y:2026,m:3}
};
const KEY='temuTracker_v4';
const CAT_COLORS=['#ff7701','#efca08','#00a6a6','#9c528b','#4D96FF','#FF85A1','#00C9A7','#6BCB77','#a07050','#ADB5BD'];

function buildCalendar(){
  const now=new Date(), curY=now.getFullYear();
  const yrs=[...new Set([2025,curY,curY<2026?2026:curY+1])].sort();
  const years={};
  yrs.forEach(y=>{years[y]={};});
  Object.entries(SEED_MAP).forEach(([sheet,{y,m}])=>{
    if(!years[y])years[y]={};
    const sd=SEED[sheet];
    years[y][m]={name:sd.name,items:sd.items.map(i=>({...i}))};
  });
  yrs.forEach(y=>{for(let m=1;m<=12;m++)if(!years[y][m])years[y][m]={name:MONTHS_IT[m-1]+' '+y,items:[]};});
  return{years,categories:['Casa','Moda','Cancelleria','Regalo','Tech','Hobby','Sport','Cibo','Altro'],
         currentYear:curY,currentMonth:now.getMonth()+1,filterTipo:'',filterCat:'',sortBy:'order'};
}

let S;
function load(){try{const d=localStorage.getItem(KEY);if(d){S=JSON.parse(d);return;}}catch(e){}S=buildCalendar();}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function getItem(id){
  const mo=S.years[S.currentYear]?.[S.currentMonth];
  return (mo?.items||[]).find(i=>i.id===id)||null;
}

// ── MATH ──
function totale(it){return Math.max(0,(it.prezzo||0)-(it.sc1||0)-(it.sc2||0)-(it.sc3||0));}
function risparmio(it){
  const alt=(it.prezzoAltrove!==null&&it.prezzoAltrove!==undefined&&it.prezzoAltrove!=='')
    ?+it.prezzoAltrove:(it.prezzo||0);
  return alt-totale(it);
}
function eur(n){if(n===null||n===undefined||isNaN(n))return'—';return'€\u00A0'+Number(n).toFixed(2);}

// ── STATS ──
function mStats(y,m){
  const mo=S.years[y]?.[m];if(!mo)return{};
  const items=(mo.items||[]).filter(i=>i.nome?.trim());
  const ts=items.reduce((a,i)=>a+totale(i),0);
  const tr=items.reduce((a,i)=>a+risparmio(i),0);
  const utili=items.filter(i=>i.tipo==='utile'),sfizi=items.filter(i=>i.tipo==='sfizio');
  return{totSpeso:ts,totRisp:tr,count:items.length,media:items.length?ts/items.length:0,
         utili:utili.length,sfizi:sfizi.length,
         spesaUtile:utili.reduce((a,i)=>a+totale(i),0),
         spesaSfizio:sfizi.reduce((a,i)=>a+totale(i),0)};
}
function globalStats(){
  let ts=0,tr=0,cnt=0;
  Object.values(S.years).forEach(ms=>Object.values(ms).forEach(mo=>{
    const items=(mo.items||[]).filter(i=>i.nome?.trim());
    if(items.length){ts+=items.reduce((a,i)=>a+totale(i),0);tr+=items.reduce((a,i)=>a+risparmio(i),0);cnt++;}
  }));
  return{totS:ts,totR:tr,media:cnt?ts/cnt:0};
}

// ── RENDER ──
function render(){renderHeader();renderYears();renderMonths();renderMain();}

function renderHeader(){
  const g=globalStats();
  document.getElementById('global-stats').innerHTML=`
    <div class="gstat"><div class="lbl">Totale speso</div><div class="val">${eur(g.totS)}</div></div>
    <div class="gstat"><div class="lbl">Risparmiato</div><div class="val">${eur(g.totR)}</div></div>
    <div class="gstat"><div class="lbl">Media/mese</div><div class="val">${eur(g.media)}</div></div>`;
}

function renderYears(){
  document.getElementById('year-nav').innerHTML=
    Object.keys(S.years).sort().map(y=>`<div class="year-tab ${+y===S.currentYear?'active':''}" onclick="selYear(${y})">${y}</div>`).join('')
    +`<button class="add-year-btn" onclick="addYear()">+ Anno</button>`;
}

function renderMonths(){
  const ym=S.years[S.currentYear]||{};
  document.getElementById('months-nav').innerHTML=
    Array.from({length:12},(_,i)=>i+1).map(m=>{
      const mo=ym[m]||{},cnt=(mo.items||[]).filter(i=>i.nome?.trim()).length;
      return`<div class="month-tab ${m===S.currentMonth?'active':''} ${cnt?'has-data':''}" onclick="selMonth(${m})">
        <span class="m-name">${MONTHS_IT[m-1].slice(0,3)}</span>
        <span class="m-count">${cnt||'·'}</span></div>`;
    }).join('');
}

function renderMain(){
  const main=document.getElementById('main-content');
  const mo=S.years[S.currentYear]?.[S.currentMonth];
  const mName=mo?.name||(MONTHS_IT[S.currentMonth-1]+' '+S.currentYear);
  if(!mo){
    main.innerHTML=`<div class="month-content"><div class="empty-month">
      <div style="font-size:50px;margin-bottom:12px">📅</div>
      <h2>${mName}</h2><p>Nessun articolo ancora.</p>
      <button class="btn btn-p" onclick="showAddItem()">+ Aggiungi articolo</button>
    </div></div>`;return;
  }
  const st=mStats(S.currentYear,S.currentMonth);
  const allItems=(mo.items||[]).filter(i=>i.nome?.trim());
  let items=[...allItems];
  if(S.filterTipo)items=items.filter(i=>i.tipo===S.filterTipo);
  if(S.filterCat) items=items.filter(i=>i.categoria===S.filterCat);
  if(S.sortBy==='cat')      items.sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||''));
  else if(S.sortBy==='tipo')items.sort((a,b)=>(a.tipo||'z').localeCompare(b.tipo||'z'));
  else if(S.sortBy==='asc') items.sort((a,b)=>totale(a)-totale(b));
  else if(S.sortBy==='desc')items.sort((a,b)=>totale(b)-totale(a));
  else if(S.sortBy==='risp')items.sort((a,b)=>risparmio(b)-risparmio(a));

  const ym=S.years[S.currentYear]||{};
  const nonEmpty=Object.entries(ym).filter(([,mm])=>(mm.items||[]).filter(i=>i.nome?.trim()).length>0);
  const avgHTML=nonEmpty.length>1?`<div class="avg-panel">
    <h3>📊 ${S.currentYear} — confronto mensile</h3>
    <div class="avg-grid">${nonEmpty.map(([mi,mm])=>{
      const s=mStats(S.currentYear,+mi);
      return`<div class="avg-col ${+mi===S.currentMonth?'cur':''}" onclick="selMonth(${mi})">
        <div class="avg-v">${eur(s.totSpeso)}</div>
        <div class="avg-l">${MONTHS_IT[+mi-1].slice(0,3)}</div>
        <div class="avg-n">${s.count} art.</div></div>`;
    }).join('')}</div></div>`:''

  let tableInner='';

    tableInner=`<div class="empty-state"><div class="ico">${allItems.length?'🔍':'📦'}</div>

      <p style="font-size:12px">${allItems.length?'Cambia i filtri.':'Clicca "+ Articolo"!'}</p></div>`;
  } else {
    let rows='';
    if(S.sortBy==='cat'){
      const cats=[...new Set(items.map(i=>i.categoria||''))];
      cats.forEach(cat=>{
        const g=items.filter(i=>(i.categoria||'')===cat);
        if(g.length){rows+=`<tr class="sep-row"><td colspan="13">${cat||'Senza categoria'} — ${g.length} art.</td></tr>`;rows+=g.map(itemRow).join('');}
      });
    }else rows=items.map(itemRow).join('');
    tableInner=`<table><thead><tr>
      <th>Tipo</th><th>Categoria</th><th>Prodotto</th>
      <th>Prezzo</th><th>Sc.1</th><th>Sc.2</th><th>Sc.3</th>
      <th>Motivo</th><th>Totale</th>
      <th>P.altrove</th><th>Dove</th><th>Risparmio</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>`;
  }

  main.innerHTML=`<div class="month-content">
    ${avgHTML}
    <div class="month-stats">
      <div class="stat-card c1"><div class="lbl">💸 Totale speso</div><div class="val">${eur(st.totSpeso)}</div><div class="sub">${st.count} articoli</div></div>
      <div class="stat-card c2"><div class="lbl">💰 Risparmio</div><div class="val">${eur(st.totRisp)}</div></div>
      <div class="stat-card c3"><div class="lbl">📦 Media/articolo</div><div class="val">${eur(st.media)}</div></div>
      <div class="stat-card c2"><div class="lbl">✨ Utili</div><div class="val">${st.utili}</div><div class="sub">${eur(st.spesaUtile)}</div></div>
      <div class="stat-card c4"><div class="lbl">🍬 Sfizi</div><div class="val">${st.sfizi}</div><div class="sub">${eur(st.spesaSfizio)}</div></div>
    </div>
    <div class="toolbar">
      <button class="btn btn-p" onclick="showAddItem()">+ Articolo</button>
      <select class="fs" onchange="S.filterTipo=this.value;save();renderMain()">
        <option value="" ${!S.filterTipo?'selected':''}>Tutti i tipi</option>
        <option value="utile" ${S.filterTipo==='utile'?'selected':''}>✨ Utili</option>
        <option value="sfizio" ${S.filterTipo==='sfizio'?'selected':''}>🍬 Sfizi</option>
      </select>
      <select class="fs" onchange="S.filterCat=this.value;save();renderMain()">
        <option value="">Tutte le categorie</option>
        ${S.categories.map(c=>`<option value="${c}" ${S.filterCat===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="ss" onchange="S.sortBy=this.value;save();renderMain()">
        <option value="order" ${S.sortBy==='order'?'selected':''}>Ordine inserimento</option>
        <option value="cat"   ${S.sortBy==='cat'?'selected':''}>Per categoria</option>
        <option value="tipo"  ${S.sortBy==='tipo'?'selected':''}>Per tipo</option>
        <option value="desc"  ${S.sortBy==='desc'?'selected':''}>Prezzo ↓</option>
        <option value="asc"   ${S.sortBy==='asc'?'selected':''}>Prezzo ↑</option>
        <option value="risp"  ${S.sortBy==='risp'?'selected':''}>Risparmio ↓</option>
      </select>
      <button class="btn btn-s" style="margin-left:auto" onclick="showCatModal()">🏷️ Categorie</button>
    </div>
    <div class="table-wrapper">${tableInner}</div>
  </div>`;
}

function itemRow(it){
  const tot=totale(it),risp=risparmio(it);
  const altVal=(it.prezzoAltrove!==null&&it.prezzoAltrove!==undefined&&it.prezzoAltrove!=='') ?+it.prezzoAltrove:null;
  const tipoBadge=it.tipo==='utile'
    ?`<button class="tipo-badge utile" onclick="toggleTipo('${it.id}')">✨ Utile</button>`
    :it.tipo==='sfizio'
    ?`<button class="tipo-badge sfizio" onclick="toggleTipo('${it.id}')">🍬 Sfizio</button>`
    :`<button class="tipo-badge nessuno" onclick="toggleTipo('${it.id}')">—</button>`;
  const ci=S.categories.indexOf(it.categoria||''),cc=CAT_COLORS[ci>=0?ci%CAT_COLORS.length:9];
  const catBadge=it.categoria
    ?`<span class="cat-badge" style="background:${cc}22;color:${cc};border:1px solid ${cc}55">${esc(it.categoria)}</span>`
    :`<span class="muted" style="font-size:10px">—</span>`;
  const scEl=v=>v?`<span class="num neg">-${eur(v)}</span>`:`<span class="muted">—</span>`;
  const rispEl=risp!==0?`<span class="num ${risp>=0?'pos':'neg'}">${eur(risp)}</span>`:`<span class="muted">—</span>`;

  // Editable cell helpers
  const ec=(field,type,displayVal,extra='')=>
    `<td><div class="cell" onclick="inlineEdit(this,'${it.id}','${field}','${type}')" title="Clicca per modificare" ${extra}>${displayVal}</div></td>`;

  return`<tr data-id="${it.id}">
    <td><div class="cell-ro">${tipoBadge}</div></td>
    <td><div class="cell" onclick="inlineCat(this,'${it.id}')" title="Clicca per modificare">${catBadge}</div></td>
    ${ec('nome','text',`<strong>${esc(it.nome)}</strong>`)}
    ${ec('prezzo','number',`<span class="num">${eur(it.prezzo||0)}</span>`)}
    ${ec('sc1','number',scEl(it.sc1))}
    ${ec('sc2','number',scEl(it.sc2))}
    ${ec('sc3','number',scEl(it.sc3))}
    ${ec('motivo','text',`<span style="font-size:11px;color:var(--ink3)">${esc(it.motivo||'')}</span>`)}
    <td><div class="cell-ro"><strong class="num">${eur(tot)}</strong></div></td>
    ${ec('prezzoAltrove','number',altVal!==null?`<span class="num">${eur(altVal)}</span>`:`<span class="muted">—</span>`)}
    ${ec('dove','text',`<span style="font-size:11px;color:var(--ink3)">${esc(it.dove||'')}</span>`)}
    <td><div class="cell-ro">${rispEl}</div></td>
    <td><div class="cell-ro" style="gap:2px">
      <button class="action-btn" onclick="editItem('${it.id}')" title="Modifica completa">✏️</button>
      <button class="action-btn del" onclick="delItem('${it.id}')" title="Elimina">🗑️</button>
    </div></td>
  </tr>`;
}

// ── INLINE EDITING ──
function inlineEdit(cell, id, field, type) {
  if(cell.classList.contains('editing')) return;
  const it = getItem(id); if(!it) return;
  const rawVal = it[field]??'';
  cell.classList.add('editing');
  const inp = document.createElement('input');
  inp.type = type;
  if(type==='number'){inp.step='0.01';inp.min='0';}
  inp.value = rawVal===null?'':rawVal;
  cell.innerHTML=''; cell.appendChild(inp);
  inp.focus(); inp.select();

  function commit(){
    let v = inp.value.trim();
    if(type==='number'){
      v = v===''?null:parseFloat(v)||0;
    }
    it[field]=v; save();
    // Re-render only this row's computed cells (partial update)
    const tr = cell.closest('tr');
    if(tr) {
      const newRow = document.createElement('tbody');
      newRow.innerHTML = itemRow(it);
      tr.parentNode.replaceChild(newRow.firstChild, tr);
    }
    renderHeader();renderMonths();
    // Update stat cards
    const st=mStats(S.currentYear,S.currentMonth);
    const cards=document.querySelectorAll('.stat-card');
    if(cards.length>=5){
      cards[0].querySelector('.val').textContent=eur(st.totSpeso);
      cards[0].querySelector('.sub').textContent=st.count+' articoli';
      cards[1].querySelector('.val').textContent=eur(st.totRisp);
      cards[2].querySelector('.val').textContent=eur(st.media);
      cards[3].querySelector('.val').textContent=st.utili;
      cards[3].querySelector('.sub').textContent=eur(st.spesaUtile);
      cards[4].querySelector('.val').textContent=st.sfizi;
      cards[4].querySelector('.sub').textContent=eur(st.spesaSfizio);
    }
  }

  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){cell.classList.remove('editing');renderMain();}
  });
}

function inlineCat(cell, id) {
  if(cell.classList.contains('editing')) return;
  const it = getItem(id); if(!it) return;
  cell.classList.add('editing');
  const sel = document.createElement('select');
  sel.innerHTML = `<option value="">— Nessuna —</option>`
    + S.categories.map(c=>`<option value="${c}" ${c===it.categoria?'selected':''}>${c}</option>`).join('');
  cell.innerHTML=''; cell.appendChild(sel);
  sel.focus();

  function commit(){
    it.categoria = sel.value; save();
    const tr = cell.closest('tr');
    if(tr){
      const nb = document.createElement('tbody');
      nb.innerHTML = itemRow(it);
      tr.parentNode.replaceChild(nb.firstChild, tr);
    }
    renderHeader();renderMonths();
  }
  sel.addEventListener('blur',commit);
  sel.addEventListener('change',()=>sel.blur());
  sel.addEventListener('keydown',e=>{if(e.key==='Escape'){cell.classList.remove('editing');renderMain();}});
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── NAVIGATION ──
function selYear(y){S.currentYear=+y;S.filterTipo='';S.filterCat='';S.sortBy='order';save();render();}
function selMonth(m){S.currentMonth=+m;S.filterTipo='';S.filterCat='';S.sortBy='order';save();renderMonths();renderMain();}
function addYear(){
  const y=parseInt(prompt('Anno da aggiungere:'));
  if(!y||isNaN(y)||S.years[y])return;
  S.years[y]={};
  for(let m=1;m<=12;m++)S.years[y][m]={name:MONTHS_IT[m-1]+' '+y,items:[]};
  S.currentYear=y;save();render();
}

// ── ITEM MODAL ──
let editId=null;
function showAddItem(){
  editId=null;
  document.getElementById('modal-title').textContent='Aggiungi articolo';
  ['f-nome','f-prezzo','f-sc1','f-sc2','f-sc3','f-motivo','f-altrove','f-dove'].forEach(id=>document.getElementById(id).value='');
  fillCatSel('');selTipo(document.querySelector('[data-tipo=""]'));updateComputed();
  openModal('item-modal-overlay');setTimeout(()=>document.getElementById('f-nome').focus(),120);
}
function editItem(id){
  const it=getItem(id);if(!it)return;
  editId=id;
  document.getElementById('modal-title').textContent='Modifica articolo';
  document.getElementById('f-nome').value=it.nome||'';
  document.getElementById('f-prezzo').value=it.prezzo||'';
  document.getElementById('f-sc1').value=it.sc1||'';
  document.getElementById('f-sc2').value=it.sc2||'';
  document.getElementById('f-sc3').value=it.sc3||'';
  document.getElementById('f-motivo').value=it.motivo||'';
  document.getElementById('f-altrove').value=it.prezzoAltrove!==null&&it.prezzoAltrove!==undefined?it.prezzoAltrove:'';
  document.getElementById('f-dove').value=it.dove||'';
  fillCatSel(it.categoria||'');
  selTipo(document.querySelector(`[data-tipo="${it.tipo||''}"]`));
  updateComputed();openModal('item-modal-overlay');
}
function saveItem(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){toast('Inserisci il nome ⚠️');return;}
  const prezzo=parseFloat(document.getElementById('f-prezzo').value)||0;
  const sc1=parseFloat(document.getElementById('f-sc1').value)||0;
  const sc2=parseFloat(document.getElementById('f-sc2').value)||0;
  const sc3=parseFloat(document.getElementById('f-sc3').value)||0;
  const motivo=document.getElementById('f-motivo').value.trim();
  const av=document.getElementById('f-altrove').value;
  const prezzoAltrove=av!==''?parseFloat(av):null;
  const dove=document.getElementById('f-dove').value.trim();
  const tipo=document.querySelector('.tipo-option.sel-utile')?'utile':document.querySelector('.tipo-option.sel-sfizio')?'sfizio':'';
  const categoria=document.getElementById('f-cat').value;
  let mo=S.years[S.currentYear]?.[S.currentMonth];
  if(!mo){S.years[S.currentYear]=S.years[S.currentYear]||{};S.years[S.currentYear][S.currentMonth]={name:MONTHS_IT[S.currentMonth-1]+' '+S.currentYear,items:[]};mo=S.years[S.currentYear][S.currentMonth];}
  const items=mo.items||[];
  if(editId){const idx=items.findIndex(i=>i.id===editId);if(idx>=0)items[idx]={...items[idx],nome,prezzo,sc1,sc2,sc3,motivo,prezzoAltrove,dove,tipo,categoria};}
  else items.push({id:uid(),nome,prezzo,sc1,sc2,sc3,motivo,prezzoAltrove,dove,tipo,categoria});
  mo.items=items;save();closeItemModal();render();toast(editId?'Aggiornato ✓':'Aggiunto ✓');
}
function delItem(id){
  if(!confirm('Eliminare questo articolo?'))return;
  const mo=S.years[S.currentYear]?.[S.currentMonth];if(!mo)return;
  mo.items=(mo.items||[]).filter(i=>i.id!==id);save();render();toast('Eliminato');
}
function toggleTipo(id){
  const it=getItem(id);if(!it)return;
  const seq=['','utile','sfizio'];it.tipo=seq[(seq.indexOf(it.tipo||'')+1)%3];save();
  const tr=document.querySelector(`tr[data-id="${id}"]`);
  if(tr){const nb=document.createElement('tbody');nb.innerHTML=itemRow(it);tr.parentNode.replaceChild(nb.firstChild,tr);}
}
function updateComputed(){
  const p=parseFloat(document.getElementById('f-prezzo').value)||0;
  const s1=parseFloat(document.getElementById('f-sc1').value)||0;
  const s2=parseFloat(document.getElementById('f-sc2').value)||0;
  const s3=parseFloat(document.getElementById('f-sc3').value)||0;
  const tot=Math.max(0,p-s1-s2-s3);
  const av=document.getElementById('f-altrove').value;
  const alt=av!==''?parseFloat(av):p;
  const risp=alt-tot;
  document.getElementById('c-totale').textContent=eur(tot);
  const cd=document.getElementById('c-risparmio');cd.textContent=eur(risp);
  cd.style.color=risp>=0?'var(--teal)':'var(--purple)';
}
function selTipo(el){document.querySelectorAll('.tipo-option').forEach(o=>o.classList.remove('sel-utile','sel-sfizio','sel-none'));const t=el.dataset.tipo;el.classList.add(t==='utile'?'sel-utile':t==='sfizio'?'sel-sfizio':'sel-none');}
function fillCatSel(sel){document.getElementById('f-cat').innerHTML=`<option value="">— Nessuna —</option>`+S.categories.map(c=>`<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join('');}
function closeItemModal(){closeModal('item-modal-overlay');}

// ── CAT MODAL ──
function showCatModal(){
  document.getElementById('cat-list-modal').innerHTML=S.categories.map((c,i)=>`<div class="cat-item"><div style="display:flex;align-items:center;gap:8px"><div class="cat-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></div><span style="font-size:13px">${esc(c)}</span></div><button class="action-btn del" onclick="removeCategory(${i})">✕</button></div>`).join('');
  document.getElementById('f-new-cat').value='';openModal('cat-modal-overlay');
}
function addCategory(){const v=document.getElementById('f-new-cat').value.trim();if(!v)return;if(S.categories.includes(v)){toast('Già esistente');return;}S.categories.push(v);save();showCatModal();}
function removeCategory(i){const cat=S.categories[i];S.categories.splice(i,1);Object.values(S.years).forEach(ms=>Object.values(ms).forEach(mo=>(mo.items||[]).forEach(it=>{if(it.categoria===cat)it.categoria='';})));save();showCatModal();}

// ── MODAL HELPERS ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function handleOvClick(e,id){if(e.target.id===id)closeModal(id);}

// ── TOAST ──
let _t;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),2400);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')['item-modal-overlay','cat-modal-overlay'].forEach(closeModal);});

// ── INIT ──
load();
const _now=new Date();
if(!S.currentYear)S.currentYear=_now.getFullYear();
if(!S.currentMonth)S.currentMonth=_now.getMonth()+1;
render();
</script>
</body>
